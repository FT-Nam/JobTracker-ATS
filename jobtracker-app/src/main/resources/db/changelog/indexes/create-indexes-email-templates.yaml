databaseChangeLog:
  - changeSet:
      id: create-indexes-email-templates
      author: namphan
      changes:
        - createIndex:
            indexName: uniq_company_code
            tableName: email_templates
            unique: true
            columns:
              - column:
                  name: company_id
              - column:
                  name: code
        - createIndex:
            indexName: idx_email_templates_company
            tableName: email_templates
            columns:
              - column:
                  name: company_id
        - createIndex:
            indexName: idx_email_templates_code
            tableName: email_templates
            columns:
              - column:
                  name: code
        - createIndex:
            indexName: idx_email_templates_deleted_at
            tableName: email_templates
            columns:
              - column:
                  name: deleted_at
